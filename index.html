<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Horilose Business Card</title>
    <base href="/" />
    <style>
        :root {
            --opensilver-loading-background-color: #201f1f;
            --opensilver-loading-progress-bg: #505050;
            --opensilver-loading-progress-bar-color: #fff;
            --opensilver-loading-counter-color: #848181;
            --opensilver-loading-progress-border-color: #505050;
        }
    </style>
    <!-- Подключаем стили загрузки из локальной папки libs -->
    <link rel="stylesheet" type="text/css" href="libs/loading-indicator.css" />
    <!-- Подключаем анимацию загрузки из локальной папки libs -->
    <script src="libs/loading-animation.js"></script>
</head>
<body>
    <div id="app">
        <div class="opensilver-loading-indicator">
            <div class="opensilver-loader-container">
                <div class="opensilver-loader">
                    <div class="opensilver-loader-progress">
                        <div class="opensilver-loader-progress-bar"></div>
                    </div>
                </div>
                <div class="opensilver-counter-container">
                    <span class="opensilver-odometer"></span>
                    <span class="opensilver-odometer"></span>
                    <span class="opensilver-odometer"></span>
                </div>
            </div>
        </div>
    </div>
    <div id="opensilver-root" style="position: relative; width: 100%; height: 100%; overflow-x: hidden; overflow-y: hidden"></div>

    <!-- Подключаем opensilver.js из локальной папки libs -->
    <script src="libs/opensilver.js"></script>
    
    <!-- Подключаем blazor.webassembly.js из локальной папки libs -->
    <script src="libs/blazor.webassembly.js"></script>

    <!-- Здесь будет запускаться ваше приложение -->
    <script>
        System.config({
            meta: {
                '*.dll': { loader: 'blazor-http-loader' },
                '*.wasm': { loader: 'blazor-http-loader' },
                '*.pdb': { loader: 'blazor-http-loader' }
            }
        });
        
        OpenSilver.init({
            applicationPath: 'MyBusinessCard.Browser.dll',
            resourcesPath: './',
            autoStart: true
        });
    </script>
</body>
</html>
